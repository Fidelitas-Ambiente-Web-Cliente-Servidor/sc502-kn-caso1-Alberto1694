<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurante Delicias</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Restaurante Delicias</h1>
  </header>

  <main class="container">
    <section>
      <h2>Menú</h2>
      <div class="filtros">
        <button class="boton activo" data-categoria="Todos">Todos</button>
        <button class="boton" data-categoria="Entrada">Entradas</button>
        <button class="boton" data-categoria="Plato Fuerte">Platos Fuertes</button>
        <button class="boton" data-categoria="Postre">Postres</button>
      </div>
      <div id="contenedor-menu" class="row"></div>
    </section>

    <section>
      <h2>Reservas</h2>
      <form id="form-reserva">
        <div class="row">
          <div class="col-md-6 campo">
            <label>Nombre completo</label>
            <input type="text" id="nombre">
            <div id="error-nombre" class="error-campo"></div>
          </div>

          <div class="col-md-6 campo">
            <label>Correo electrónico</label>
            <input type="email" id="correo">
            <div id="error-correo" class="error-campo"></div>
          </div>

          <div class="col-md-4 campo">
            <label>Fecha de reserva</label>
            <input type="date" id="fecha">
            <div id="error-fecha" class="error-campo"></div>
          </div>

          <div class="col-md-4 campo">
            <label>Hora</label>
            <select id="hora">
              <option value="12:00">12:00</option>
              <option value="13:00">13:00</option>
              <option value="18:00">18:00</option>
              <option value="19:00">19:00</option>
              <option value="20:00">20:00</option>
            </select>
          </div>

          <div class="col-md-4 campo">
            <label>Número de personas</label>
            <input type="number" id="personas">
            <div id="error-personas" class="error-campo"></div>
          </div>

          <div class="col-12 campo">
            <label>Comentarios</label>
            <textarea id="comentarios"></textarea>
          </div>
        </div>

        <button type="submit" id="btn-enviar" class="boton" disabled>Enviar reserva</button>
        <p id="mensaje"></p>
      </form>
    </section>

    <section>
      <h2>Reservas registradas</h2>
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Correo</th>
              <th>Fecha</th>
              <th>Hora</th>
              <th>Personas</th>
            </tr>
          </thead>
          <tbody id="tabla-reservas"></tbody>
        </table>
      </div>
      <div id="resumen" class="resumen-reservas"></div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
